<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 240">
    <defs>
          <style>
                  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;display=swap');
                  .filled {
                    font-family: 'Bebas Neue', 'Arial Narrow', Arial, sans-serif;
                    font-size: 200px;
                    fill: white;
